# Netlify - sito statico pre-buildato (nessun comando di build)
[build]
  publish = "."
  # Nessun command: il pipeline genera i file prima del push

[functions]
  directory = "netlify/functions"

# Feed e sitemap con Content-Type espliciti (lettori RSS / validatori / tool esterni)
[[headers]]
  for = "/feed.xml"
  [headers.values]
    Content-Type = "application/rss+xml; charset=UTF-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"

# HTML: evita che CDN/browser servino pagine obsolete dopo un deploy (home + articoli in sottocartelle)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/*/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/webhooks/buymeacoffee"
  to = "/.netlify/functions/bmc-webhook"
  status = 200

